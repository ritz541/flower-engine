id: "world_1"
name: "Cyberpunk Neon City"
start_message: "The rain never stops in Neon City. It just changes temperature. You're standing under a flickering holographic billboard for 'Satori Cybernetics', the blue light washing over your worn jacket. Your neural link buzzes with a notification from an unknown sender. The game has begun."
lore: "A gritty futuristic city ruled by megacorps. The air is thick with smog and neon lights reflect off the rain slicked streets."
